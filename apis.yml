aid: locust
name: Locust
description: >-
  Locust is an open source load testing tool written in Python that lets you define
  user behavior with code and swarm your system with millions of simultaneous users.
  Supports HTTP, WebSocket, MQTT, SocketIO, PostgreSQL, MongoDB, and other protocols
  via pluggable user classes, with a real-time web UI for orchestrating tests.
